<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Campeonato Free Fire - Inscrições</title>
  <style>
    body { font-family: Arial, sans-serif; background: #111; color: #fff; margin: 0; padding: 20px; }
    .container { max-width: 600px; margin: auto; background: #222; padding: 30px; border-radius: 10px; }
    input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; }
    button { background: #e74c3c; color: white; font-weight: bold; cursor: pointer; }
    button:hover { background: #c0392b; }
    #app { display: none; }
    .hidden { display: none; }
    .player-form, .team-form { margin-top: 20px; }
  </style>
</head>
<body>

<div class="container">
  <h1>Campeonato Free Fire</h1>
  
  <!-- Área de autenticação -->
  <div id="auth">
    <h2 id="form-title">Entrar</h2>
    <input id="email" type="email" placeholder="Seu email" required/>
    <input id="password" type="password" placeholder="Senha" required/>
    <button id="submit-btn" onclick="handleAuth()">Entrar</button>
    <p>Já tem conta? <a href="#" onclick="toggleForm()">Criar conta</a></p>
    <p id="error" style="color: #e74c3c;"></p>
  </div>

  <!-- Área logada -->
  <div id="app" class="hidden">
    <h2>Bem-vindo, <span id="user-email"></span>!</h2>
    <button onclick="logout()">Sair</button>

    <div class="player-form">
      <h3>Seu Perfil de Jogador (abra para contratações)</h3>
      <input id="nome-real" placeholder="Nome verdadeiro"/>
      <input id="nick-ff" placeholder="Nick no Free Fire"/>
      <input type="file" id="foto-jogador" accept="image/*"/>
      <label><input type="checkbox" id="aberto-contratacao"/> Aberto para contratações</label>
      <button onclick="salvarJogador()">Salvar Perfil</button>
    </div>

    <div class="team-form hidden" id="team-section">
      <h3>Cadastrar sua Equipe (só capitão)</h3>
      <input id="nome-time" placeholder="Nome do Time"/>
      <input type="file" id="logo-time" accept="image/*"/>
      <input type="file" id="banner-time" accept="image/*"/>
      <!-- Fotos dos 6 jogadores -->
      <h4>Fotos dos 6 jogadores</h4>
      <input type="file" id="foto1" accept="image/*"/>
      <input type="file" id="foto2" accept="image/*"/>
      <input type="file" id="foto3" accept="image/*"/>
      <input type="file" id="foto4" accept="image/*"/>
      <input type="file" id="foto5" accept="image/*"/>
      <input type="file" id="foto6" accept="image/*"/>
      <button onclick="salvarEquipe()">Inscrever Equipe</button>
    </div>
  </div>
</div>

<!-- Supabase Client -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  const supabaseUrl = 'https://rkdrhnzvnttegnmkevlf.supabase.co';          // cola a tua URL
  const supabaseKey = 'sb_publishable_XIdFWr-cCw2I2EHDrd_9Gw_gM0sDDY1';    // cola a anon key
  const supabase = Supabase.createClient(supabaseUrl, supabaseKey);


  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const storage = getStorage(app);

  let currentUser = null;

  // No lugar do onAuthStateChanged
supabase.auth.onAuthStateChange((event, session) => {
  currentUser = session?.user ?? null;
  if (currentUser) {
    document.getElementById('auth').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    document.getElementById('user-email').textContent = currentUser.email;
    document.getElementById('team-section').classList.remove('hidden');
  } else {
    document.getElementById('auth').classList.remove('hidden');
    document.getElementById('app').classList.add('hidden');
  }
});

// Função de login/cadastro (handleAuth)
window.handleAuth = async () => {
  const email = document.getElementById('email').value;
  const pass = document.getElementById('password').value;
  const isSignup = document.getElementById('form-title').textContent === 'Criar Conta';

  let result;
  if (isSignup) {
    result = await supabase.auth.signUp({ email, password: pass });
  } else {
    result = await supabase.auth.signInWithPassword({ email, password: pass });
  }

  if (result.error) {
    document.getElementById('error').textContent = result.error.message;
  } else {
    // Sucesso → onAuthStateChange cuida do resto
  }
};

window.logout = async () => {
  await supabase.auth.signOut();
};

  window.toggleForm = () => {
    const title = document.getElementById('form-title');
    const btn = document.getElementById('submit-btn');
    if (title.textContent === 'Entrar') {
      title.textContent = 'Criar Conta';
      btn.textContent = 'Cadastrar';
    } else {
      title.textContent = 'Entrar';
      btn.textContent = 'Entrar';
    }
  };

  window.handleAuth = () => {
    const email = document.getElementById('email').value;
    const pass = document.getElementById('password').value;
    const title = document.getElementById('form-title').textContent;

    if (title === 'Criar Conta') {
      createUserWithEmailAndPassword(auth, email, pass)
        .catch(err => document.getElementById('error').textContent = err.message);
    } else {
      signInWithEmailAndPassword(auth, email, pass)
        .catch(err => document.getElementById('error').textContent = err.message);
    }
  };

  window.logout = () => signOut(auth);

  async function uploadFile(file, path) {
    if (!file) return null;
    const storageRef = ref(storage, path);
    await uploadBytes(storageRef, file);
    return getDownloadURL(storageRef);
  }

 window.salvarJogador = async () => {
  if (!currentUser) return alert("Faça login primeiro!");

  const nome = document.getElementById('nome-real').value;
  const nick = document.getElementById('nick-ff').value;
  const aberto = document.getElementById('aberto-contratacao').checked;
  const fotoFile = document.getElementById('foto-jogador').files[0];

  let fotoUrl = null;
  if (fotoFile) {
    const { data, error } = await supabase.storage
      .from('fotos')                          // nome do bucket
      .upload(`jogadores/${currentUser.id}/foto.jpg`, fotoFile, { upsert: true });

    if (error) return alert("Erro no upload: " + error.message);
    fotoUrl = `${supabaseUrl}/storage/v1/object/public/fotos/${data.path}`;
  }

  const { error } = await supabase
    .from('jogadores')
    .upsert({
      id: currentUser.id,
      nome, nick, foto_url: fotoUrl, aberto_contratacao: aberto, email: currentUser.email
    });

  if (error) alert("Erro ao salvar: " + error.message);
  else alert("Perfil salvo!");
};

  window.salvarEquipe = async () => {
    if (!currentUser) return alert("Faça login primeiro!");
    const nomeTime = document.getElementById('nome-time').value;
    const logoFile = document.getElementById('logo-time').files[0];
    const bannerFile = document.getElementById('banner-time').files[0];

    let logoUrl = await uploadFile(logoFile, `equipes/${currentUser.uid}/logo.png`);
    let bannerUrl = await uploadFile(bannerFile, `equipes/${currentUser.uid}/banner.png`);

    let fotos = [];
    for (let i = 1; i <= 6; i++) {
      const file = document.getElementById(`foto${i}`).files[0];
      if (file) {
        const url = await uploadFile(file, `equipes/${currentUser.uid}/jogador${i}.jpg`);
        fotos.push(url);
      }
    }

    await setDoc(doc(db, "equipes", currentUser.uid), {
      nomeTime, logoUrl, bannerUrl, fotosJogadores: fotos, capitão: currentUser.email, timestamp: new Date()
    });
    alert("Equipe inscrita com sucesso!");
  };
</script>
</body>
</html>
